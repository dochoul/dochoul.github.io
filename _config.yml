#theme: jekyll-theme-cayman

# Permalinks
permalink:      /:year-:month-:day/:title

# Setup
title:          DY Blog
description:    "AI, Investment, Engineering, Life"
title_separator: " · "
author:
  name:         DeokYeon Kim
  email:        kimdy@gabia.com
lang:           ko
paginate:       10
baseurl:        ""
url:            "https://dochoul.github.io"

# Social (used by jekyll-seo-tag for Twitter cards, author links, etc.)
twitter:
  username: dochoul

social:
  name:         DeokYeon Kim
  links:
    - https://github.com/dochoul
    - https://x.com/dochoul

# Assets
sass:
  sass_dir:     _sass
  style:        :compressed

# Build settings
markdown:       kramdown

# Analytics
google_analytics: G-3WTW6QDTD4

# Exclude from Jekyll processing
# (renew/ is a separately-built React/Vite app; _app is the source dir)
exclude:
  - renew/_app
  - renew/_app/node_modules

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
