<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
{% include head.html %}

  <body>
    <nav class="nav">
      <div class="nav-container">
        <a href="{{ site.url }}/" class="nav-title">
          <img src="{{ '/assets/logo.svg' | prepend: site.baseurl }}" alt="{{ site.title }}" class="nav-logo nav-logo--default" />
          <img src="{{ '/assets/logo-inverted.svg' | prepend: site.baseurl }}" alt="{{ site.title }}" class="nav-logo nav-logo--inverted" />
        </a>
        <ul>
          <!-- <li><a href="{{ '/about' | prepend: site.url }}">About</a></li> -->
          <!-- <li><a href="{{ site.url }}/">Posts</a></li> -->
          <!-- <li><a href="{{ '/category#gtris' | prepend: site.url }}">Gtris</a></li> -->
        </ul>
    </div>
  </nav>

  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="테마 전환">
    <span class="theme-toggle-item theme-toggle-item--dark">
      <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
        <path d="M20 14.5A8 8 0 0 1 9.5 4a8 8 0 1 0 10.5 10.5z" fill="currentColor"/>
      </svg>
      DARK
    </span>
    <span class="theme-toggle-item theme-toggle-item--light">
      <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
        <circle cx="12" cy="12" r="4" fill="currentColor"/>
        <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
          <line x1="4.9" y1="4.9" x2="7" y2="7"/><line x1="17" y1="17" x2="19.1" y2="19.1"/>
          <line x1="4.9" y1="19.1" x2="7" y2="17"/><line x1="17" y1="7" x2="19.1" y2="4.9"/>
        </g>
      </svg>
      LIGHT
    </span>
  </button>

    <main>
      {{ content }}
    </main>

    <footer>
      <span>WRITTEN BY <u>DOCHOUL</u></span>
    </footer>

    <script src="{{ '/js/theme.js?v=darkmode1' | prepend: site.baseurl }}"></script>
    <script src="{{ '/js/copy-code.js' | prepend: site.baseurl }}"></script>
  </body>
</html>
