#theme: jekyll-theme-cayman

# Permalinks
permalink:      /:year-:month-:day/:title

# Setup
title:          DeokYeon.kim
paginate:       5
baseurl:        ""
url:            "https://dochoul.github.io"

# Assets
sass:
  sass_dir:     _sass
  style:        :compressed

# Build settings
markdown:       kramdown

# Analytics
google_analytics: G-3WTW6QDTD4

# Exclude from Jekyll processing
# (renew/ is a separately-built React/Vite app; _app is the source dir)
exclude:
  - renew/_app
  - renew/_app/node_modules

# Plugins
plugins:
  - jekyll-paginate
