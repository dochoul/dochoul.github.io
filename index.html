---
layout: default
---

<div class="catalogue">
  {% for post in site.posts %}
    <a href="{{ post.url | prepend: site.url }}" class="catalogue-item">
      <div>
        <time datetime="{{ post.date }}" class="catalogue-time">{{ post.date | date: "%Y-%m-%d" }}</time>
        <h1 class="catalogue-title">
          {{ post.title }}
          <span class="catalogue-new" data-post-date="{{ post.date | date: '%Y-%m-%d' }}" style="display:none"></span>
        </h1>
        <div class="catalogue-line"></div>

        <!-- <p>
          {{ post.content | truncatewords: 30 | strip_html }}
        </p> -->

      </div>
    </a>
  {% endfor %}
</div>

<script>
  document.querySelectorAll('.catalogue-new').forEach(function(el) {
    var postDate = new Date(el.dataset.postDate);
    var diffDays = (Date.now() - postDate.getTime()) / (1000 * 60 * 60 * 24);
    if (diffDays <= 5) el.style.display = '';
  });
</script>
